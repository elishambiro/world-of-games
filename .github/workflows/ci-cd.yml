name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  IMAGE_NAME: elishambiro/project
  IMAGE_TAG: latest

jobs:
  build-and-test:
    name: Build, Test & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Start application
        run: |
          docker run -d --name wog-app -p 5000:5000 ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          sleep 5
          docker exec wog-app python -c "import sys; sys.path.insert(0, '/app'); from score import add_score; add_score('TestPlayer', 250); add_score('Alice', 180); add_score('Bob', 95)"

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:5000/ && echo "App is up" && break
            echo "Waiting... ($i)"
            sleep 3
          done

      - name: Set up Python for E2E tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install selenium requests pytest
          sudo apt-get install -y chromium-browser chromium-chromedriver
          sudo ln -sf $(which chromedriver) /usr/local/bin/chromedriver || true

      - name: Run E2E tests
        run: pytest tests/e2e.py -v

      - name: Stop application
        if: always()
        run: docker stop wog-app && docker rm wog-app

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
