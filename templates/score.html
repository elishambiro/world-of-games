<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard - World of Games</title>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding: 80px 1rem 2rem;
    }
    .page-title {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease both;
    }
    .page-title h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #49a09d, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-title p { color: rgba(255,255,255,0.5); font-size: 0.95rem; margin-top: 0.3rem; }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }
    .controls input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: white;
      padding: 8px 14px;
      font-size: 0.9rem;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }
    .controls input::placeholder { color: rgba(255,255,255,0.35); }
    .controls input:focus { border-color: rgba(167,139,250,0.7); }
    .refresh-info {
      color: rgba(255,255,255,0.4);
      font-size: 0.82rem;
    }
    .table-wrap {
      max-width: 700px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.5s 0.2s ease both;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr {
      background: linear-gradient(90deg, #5f2c82, #49a09d);
    }
    thead th {
      padding: 14px 18px;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }
    tbody tr {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.12); }
    tbody td {
      padding: 13px 18px;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.9);
    }
    .rank-cell { font-size: 1.2rem; width: 60px; text-align: center; }
    .score-cell { font-weight: 700; color: #a78bfa; }
    .top1 td { background: rgba(255,215,0,0.08); }
    .top2 td { background: rgba(192,192,192,0.07); }
    .top3 td { background: rgba(205,127,50,0.07); }
  </style>
  <script>
    var MEDALS = ['🥇','🥈','🥉'];
    var allData = [];
    var countdown = 30;
    var timer;

    function get_scores() {
      var xmlHttp = new XMLHttpRequest();
      xmlHttp.open("GET", "/get_scores", false);
      xmlHttp.setRequestHeader("Content-Type", "application/json");
      xmlHttp.send(null);
      return xmlHttp.responseText;
    }

    function renderTable(data) {
      var tbody = document.getElementById("tbody");
      var thead = document.getElementById("thead");
      tbody.innerHTML = "";
      thead.innerHTML = "";

      var hRow = document.createElement("tr");
      ['Rank','Player','Score'].forEach(function(h) {
        var th = document.createElement("th");
        th.textContent = h;
        hRow.appendChild(th);
      });
      thead.appendChild(hRow);

      data.forEach(function(item, i) {
        var tr = document.createElement("tr");
        if (i === 0) tr.className = 'top1';
        else if (i === 1) tr.className = 'top2';
        else if (i === 2) tr.className = 'top3';

        var rankTd = document.createElement("td");
        rankTd.className = 'rank-cell';
        rankTd.textContent = i < 3 ? MEDALS[i] : (i + 1);
        tr.appendChild(rankTd);

        var nameTd = document.createElement("td");
        nameTd.textContent = item.name;
        tr.appendChild(nameTd);

        var scoreTd = document.createElement("td");
        scoreTd.className = 'score-cell';
        scoreTd.textContent = item.score;
        tr.appendChild(scoreTd);

        tbody.appendChild(tr);
      });
    }

    function filterTable() {
      var query = document.getElementById('search').value.toLowerCase();
      if (!query) { renderTable(allData); return; }
      var filtered = allData.filter(function(item) {
        return item.name.toLowerCase().includes(query);
      });
      renderTable(filtered);
    }

    function start() {
      var result = get_scores();
      allData = JSON.parse(result).data;
      filterTable();
      resetCountdown();
    }

    function resetCountdown() {
      clearInterval(timer);
      countdown = 30;
      updateCountdown();
      timer = setInterval(function() {
        countdown--;
        updateCountdown();
        if (countdown <= 0) start();
      }, 1000);
    }

    function updateCountdown() {
      var el = document.getElementById('countdown');
      if (el) el.textContent = 'Auto-refresh in ' + countdown + 's';
    }
  </script>
</head>
<body onload="start();">
  {% include 'navbar.html' %}

  <div class="page-title">
    <h1>🏆 Leaderboard</h1>
    <p>Top players ranked by score</p>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search player..." oninput="filterTable()">
    <span class="refresh-info" id="countdown">Auto-refresh in 30s</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</body>
</html>
