<!DOCTYPE html>
<html>
<head>
  <title>Play - World of Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; font-family: sans-serif; }
    .game-header {
      position: fixed;
      top: 52px; left: 0; right: 0;
      height: 36px;
      background: rgba(13,13,13,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 0.5rem;
      z-index: 998;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .game-header span { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-left: 0.5rem; }
  </style>
</head>
<body>
  {% include 'navbar.html' %}
  <div class="game-header">
    <div class="dot" style="background:#ff5f57;"></div>
    <div class="dot" style="background:#febc2e;"></div>
    <div class="dot" style="background:#28c840;"></div>
    <span>world-of-games — python main.py</span>
  </div>
  <iframe
    src="http://localhost:7681/"
    style="position:fixed;top:88px;left:0;right:0;bottom:0;width:100%;height:calc(100vh - 88px);border:none;">
  </iframe>
</body>
</html>
