<style>
  .nav-link { color: white; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 0.95rem; transition: background 0.2s; }
  .nav-link:hover { background: rgba(255,255,255,0.2); }
  .nav-link.active { background: rgba(255,255,255,0.25); font-weight: 600; }
</style>
<nav style="
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0 1.5rem; height: 52px;
  background: rgba(60, 20, 100, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  font-family: sans-serif;
">
  <a href="/" style="font-weight:700;color:white;font-size:1.1rem;text-decoration:none;margin-right:auto;letter-spacing:1px;">🎮 World of Games</a>
  <a href="/"       class="nav-link" data-path="/">🏠 Home</a>
  <a href="/game"   class="nav-link" data-path="/game">🕹️ Play</a>
  <a href="/scores" class="nav-link" data-path="/scores">🏆 Leaderboard</a>
</nav>
<script>
  (function() {
    var path = window.location.pathname;
    document.querySelectorAll('.nav-link[data-path]').forEach(function(a) {
      if (a.getAttribute('data-path') === path) a.classList.add('active');
    });
  })();
</script>
