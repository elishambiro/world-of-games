<!DOCTYPE html>
<html>
<head>
  <title>World of Games</title>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      padding-top: 52px;
    }
    .hero {
      text-align: center;
      animation: fadeUp 0.6s ease both;
      margin-bottom: 3rem;
    }
    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #49a09d, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
    }
    .hero p { font-size: 1.15rem; opacity: 0.65; }
    .cards {
      display: flex;
      gap: 2rem;
      animation: fadeUp 0.6s 0.15s ease both;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2.5rem 2.5rem;
      text-align: center;
      text-decoration: none;
      color: white;
      width: 240px;
      transition: transform 0.25s, background 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(73,160,157,0.15), rgba(167,139,250,0.15));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.35); }
    .card:hover::before { opacity: 1; }
    .card .icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
    .card h2 { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.5rem; }
    .card p  { font-size: 0.9rem; opacity: 0.6; line-height: 1.5; }
    .card .arrow {
      display: inline-block;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      opacity: 0.5;
      transition: opacity 0.2s, transform 0.2s;
    }
    .card:hover .arrow { opacity: 1; transform: translateX(4px); }
  </style>
</head>
<body>
  {% include 'navbar.html' %}
  <div class="hero">
    <h1>World of Games</h1>
    <p>Three games. One leaderboard. Who's on top?</p>
  </div>
  <div class="cards">
    <a class="card" href="/game">
      <span class="icon">🕹️</span>
      <h2>Play Games</h2>
      <p>Guess the Number, Memory Challenge, Currency Roulette</p>
      <span class="arrow">Start playing →</span>
    </a>
    <a class="card" href="/scores">
      <span class="icon">🏆</span>
      <h2>Leaderboard</h2>
      <p>See who scored the highest and track your progress</p>
      <span class="arrow">View scores →</span>
    </a>
  </div>
</body>
</html>
